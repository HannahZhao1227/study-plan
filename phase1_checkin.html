<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信原理 · 重启补完计划</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--card:#fff;--text:#333;--muted:#888;--border:#e0e0e0;
  --accent:#2563eb;--accent-light:#dbeafe;--success:#16a34a;--success-light:#dcfce7;
  --warn:#ea580c;--warn-light:#fff7ed;--rest:#9333ea;--rest-light:#faf5ff;--red:#dc2626;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px;max-width:720px;margin:0 auto}

.header{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.header h1{font-size:1.25rem;margin-bottom:8px}
.header .meta{color:var(--muted);font-size:.85rem}

/* Calendar */
.calendar-section{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.countdown-row{display:flex;gap:12px;margin-bottom:12px}
.countdown-item{flex:1;text-align:center;padding:12px 8px;border-radius:10px;background:var(--bg)}
.countdown-item .label{font-size:.75rem;color:var(--muted);margin-bottom:2px}
.countdown-item .num{font-size:1.8rem;font-weight:800;color:var(--accent)}
.countdown-item .unit{font-size:.75rem;color:var(--muted)}
.countdown-item.exam{background:#fef2f2}
.countdown-item.exam .num{color:var(--red)}
.countdown-item.phase{background:var(--accent-light)}
.motto{text-align:center;font-size:.82rem;font-weight:600;color:var(--warn);margin-bottom:14px;line-height:1.5}
.calendars-grid{display:flex;justify-content:center;gap:8px}
.month-card{background:var(--bg);border-radius:10px;padding:8px 12px;text-align:center;max-width:260px}
.month-card .mname{font-size:.75rem;font-weight:700;margin-bottom:4px;color:var(--text)}
.month-card .weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:.55rem;color:var(--muted);margin-bottom:2px}
.month-card .days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.month-card .days span{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.62rem;border-radius:50%;width:22px;height:22px;margin:0 auto}
.month-card .days span.empty{background:transparent}
.month-card .days span.today{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 0 0 2px var(--accent-light)}
.month-card .days span.exam-day{background:var(--red);color:#fff;font-weight:700}
.month-card .days span.past{color:var(--border)}

/* Sync status */
.sync-status{display:inline-flex;align-items:center;gap:4px;font-size:.75rem;padding:3px 10px;border-radius:10px;font-weight:600}
.sync-status.synced{background:var(--success-light);color:var(--success)}
.sync-status.syncing{background:var(--accent-light);color:var(--accent)}
.sync-status.offline{background:var(--warn-light);color:var(--warn)}

/* Progress */
.progress-section{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.progress-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.9rem;font-weight:600}
.progress-label .pct{color:var(--accent)}
.progress-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:var(--accent);border-radius:5px;transition:width .4s ease}
.progress-detail{display:flex;flex-wrap:wrap;gap:8px;font-size:.78rem;color:var(--muted)}
.progress-detail span{padding:2px 8px;border-radius:10px;background:var(--bg)}

/* Day card */
.day{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:var(--card);transition:background .2s}
.day-header:hover{background:#fafafa}
.day-header .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.day-date{font-weight:700;font-size:.95rem;white-space:nowrap}
.day-weekday{font-size:.8rem;color:var(--muted)}
.day-chapter{font-size:.8rem;color:var(--accent);font-weight:600}
.day.rest .day-header{background:var(--rest-light)}
.day.rest .day-chapter{color:var(--rest)}
.day-header .right{display:flex;align-items:center;gap:8px}
.day-arrow{font-size:.7rem;color:var(--muted);transition:transform .3s}
.day.open .day-arrow{transform:rotate(90deg)}

.checkin-badge{font-size:.75rem;padding:3px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.checkin-badge.pending{background:var(--bg);color:var(--muted)}
.checkin-badge.done{background:var(--success-light);color:var(--success)}

.day-body{display:none;background:var(--card);border-top:1px solid var(--border);padding:0 16px 12px}
.day.open .day-body{display:block}

.task-group{margin-top:10px}
.task-group-label{font-size:.78rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.task-group-label .badge{font-size:.7rem;padding:1px 6px;border-radius:8px;color:#fff}
.badge.min{background:var(--accent)}
.badge.extra{background:var(--warn)}

.task{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:.85rem;border-bottom:1px solid #f5f5f5}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:var(--accent);flex-shrink:0}
.task label{flex:1;cursor:pointer}
.task input:checked+label{color:var(--muted);text-decoration:line-through}

.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:8px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.7}
.btn-checkin{background:var(--accent);color:#fff}
.btn-reset{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.btn-checkin.done{background:var(--success);color:#fff}

.footer{text-align:center;padding:20px;color:var(--muted);font-size:.75rem}

.chapter-note{font-size:.78rem;color:var(--warn);background:var(--warn-light);padding:6px 10px;border-radius:6px;margin-top:8px;display:none}
.day.open .chapter-note{display:block}

@media (max-width:480px){
  body{padding:10px}
  .header{padding:14px}
  .day-header{padding:10px 12px}
  .day-date{font-size:.85rem}
  .day-chapter{font-size:.73rem}
  .task{font-size:.8rem}
  .btn{padding:5px 10px;font-size:.75rem}
}

/* Sync bar */
.sync-bar{display:flex;gap:8px;align-items:center;justify-content:center;padding:10px;margin-bottom:12px;background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sync-bar .hint{font-size:.75rem;color:var(--muted);margin-right:4px}
.sync-bar .btn-sm{padding:4px 10px;font-size:.72rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-weight:600}
.sync-bar .btn-sm:active{opacity:.7}
.sync-bar .copied{color:var(--success);font-size:.72rem;display:none}
}
</style>

function renderCalendars(){
  var container = document.getElementById("calendars");
  container.innerHTML = "";
  var today = new Date();
  var curMonth = today.getMonth();
  var curYear = today.getFullYear();
  var todayKey = curYear + "-" + pad(today.getMonth()+1) + "-" + pad(today.getDate());

  var weekDays = ["日","一","二","三","四","五","六"];

    var daysInMonth = new Date(curYear, m+1, 0).getDate();

    var monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

      var dk = curYear + "-" + pad(m+1) + "-" + pad(d);
      var cls = "";
      if(dk === todayKey) cls = "today";
      else if(dk === examKey) cls = "exam-day";
      else if(dk < todayKey) cls = "past";
      daysHTML += '<span class="' + cls + '">' + d + '</span>';
    }
    container.innerHTML += '<div class="month-card"><div class="mname">' + curYear + "年 " + monthNames[m] + '</div><div class="weekdays">' + weekDays.map(function(w){ return "<span>" + w + "</span>"; }).join("") + '</div><div class="days">' + daysHTML + '</div></div>';
  });

  // Countdowns
  var todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  var examDiff = Math.ceil((EXAM_DATE - todayStart) / (1000*60*60*24));
  document.getElementById("examCountdown").querySelector(".num").textContent = examDiff;

  var phaseTarget = null;
  for(var i = 0; i < PHASES.length; i++){
    var pend = new Date(PHASES[i].end);
    if(todayStart <= pend){
      phaseTarget = { name: PHASES[i].name, days: Math.ceil((pend - todayStart) / (1000*60*60*24)) };
      break;
    }
  }
  if(phaseTarget){
    document.getElementById("phaseCountdown").querySelector(".num").textContent = phaseTarget.days;
    document.getElementById("phaseCountdown").querySelector(".unit").textContent = "天 · " + phaseTarget.name;
    document.getElementById("phaseCountdown").querySelector(".label").textContent = "当前阶段剩余";
  }
  document.getElementById("mottoText").textContent = MOTTOS[Math.floor(Math.random() * MOTTOS.length)];
}

function pad(n){ return n < 10 ? "0" + n : "" + n; }

// ===== RENDER =====
var container = document.getElementById("daysContainer");

function getTodayIndex(){
  var now = new Date();
  var m = now.getMonth() + 1;
  var d = now.getDate();
  if(m === 7 && d >= 24 && d <= 31) return d - 24;
  if(m === 8 && d >= 1 && d <= 12) return d + 7;
  if(m > 8 || (m === 8 && d > 12)) return planData.length - 1;
  return -1;
}

function getPastIncomplete(){
  var todayIdx = getTodayIndex();
  var past = [];
  for(var i = 0; i < todayIdx; i++){
    var st = state[i];
    if(planData[i].isRest) continue;
    var missing = [];
    st.minTasks.forEach(function(done, ti){ if(!done) missing.push({type:"min", text:planData[i].min[ti]}); });
    if(missing.length > 0) past.push({dayIdx:i, day:planData[i], missing:missing});
  }
  return past;
}

function isToday(di){
  return di === getTodayIndex();
}

function renderDay(day, di){
  var st = state[di];
  var dayDiv = document.createElement("div");
  dayDiv.className = "day" + (day.isRest ? " rest" : "");

  var savedOpen = loadLocalOpen();
  var hasToggled = localStorage.getItem(TOGGLED_KEY);

  if(!showAllDays){
    if(isToday(di) || getPastIncomplete().some(function(p){ return p.dayIdx === di; })){
      dayDiv.classList.add("open");
    }
  } else {
    if(!hasToggled || savedOpen.has(di)){
      dayDiv.classList.add("open");
    }
  }

  var checkinHTML = day.isRest
    ? '<span class="checkin-badge done">休息</span>'
    : (st.checkedIn
        ? '<span class="checkin-badge done">已打卡</span>'
        : '<span class="checkin-badge pending">待打卡</span>');

  var bodyHTML = "";
  if(day.min.length){
    bodyHTML += '<div class="task-group"><div class="task-group-label"><span class="badge min">保底</span> 保底任务</div>';
    day.min.forEach(function(t, ti){
      bodyHTML += '<div class="task"><input type="checkbox" id="min_' + di + '_' + ti + '"' + (st.minTasks[ti] ? ' checked' : '') + '><label for="min_' + di + '_' + ti + '">' + t + '</label></div>';
    });
    bodyHTML += '</div>';
  }
  if(day.extra.length){
    bodyHTML += '<div class="task-group"><div class="task-group-label"><span class="badge extra">有余</span> 学有余力</div>';
    day.extra.forEach(function(t, ti){
      bodyHTML += '<div class="task"><input type="checkbox" id="extra_' + di + '_' + ti + '"' + (st.extraTasks[ti] ? ' checked' : '') + '><label for="extra_' + di + '_' + ti + '">' + t + '</label></div>';
    });
    bodyHTML += '</div>';
  }
  if(day.note){
    bodyHTML += '<div class="chapter-note">' + day.note + '</div>';
  }
  bodyHTML += '<div class="btn-row">';
  if(!day.isRest){
    bodyHTML += '<button class="btn btn-checkin' + (st.checkedIn ? ' done' : '') + '" data-day="' + di + '" data-action="checkin">' + (st.checkedIn ? '已打卡' : '打卡') + '</button>';
  }
  bodyHTML += '<button class="btn btn-reset" data-day="' + di + '" data-action="reset">重置当天</button></div>';

  dayDiv.innerHTML = '<div class="day-header"><div class="left"><span class="day-date">' + day.date + '</span><span class="day-weekday">' + day.weekday + '</span><span class="day-chapter">' + day.chapter + '</span></div><div class="right">' + checkinHTML + '<span class="day-arrow">▶</span></div></div><div class="day-body">' + bodyHTML + '</div>';

  container.appendChild(dayDiv);

  dayDiv.querySelector(".day-header").addEventListener("click", function(){
    dayDiv.classList.toggle("open");
    saveLocalOpen();
  });
}

function rebuildAll(){
  container.innerHTML = "";
  if(showAllDays){
    container.innerHTML = '<div style="text-align:right;margin-bottom:8px"><button class="btn btn-reset" id="btnFocusMode">只看今日</button></div>';
    planData.forEach(function(day, di){ renderDay(day, di); });
  } else {
    var past = getPastIncomplete();
    var todayIdx = getTodayIndex();
    var pastSet = new Set();
    past.forEach(function(p){ pastSet.add(p.dayIdx); });

    var headerHTML = '<div style="text-align:right;margin-bottom:8px"><button class="btn btn-reset" id="btnShowAll">展开全部 20 天</button></div>';

    if(past.length > 0){
      headerHTML += '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px;margin-bottom:12px;font-size:.82rem"><strong style="color:#dc2626">你有 ' + past.length + ' 天的保底任务还没完成：</strong><br>';
      past.forEach(function(p){
        headerHTML += '<span style="color:#888">' + p.day.date + ' ' + p.day.chapter + '</span>：';
        headerHTML += p.missing.map(function(m){ return m.text; }).join("；") + '<br>';
      });
      headerHTML += '</div>';
    }

    headerHTML += '<div style="font-size:.85rem;font-weight:700;color:#2563eb;margin-bottom:8px">今日任务</div>';
    container.innerHTML = headerHTML;

    past.forEach(function(p){ renderDay(p.day, p.dayIdx); });
    if(todayIdx >= 0 && todayIdx < planData.length && !pastSet.has(todayIdx)){
      renderDay(planData[todayIdx], todayIdx);
    }

    if(todayIdx < 0 || todayIdx >= planData.length){
      container.innerHTML += '<div style="text-align:center;padding:20px;color:#888;font-size:.85rem">通信原理重启补完计划（7.24-8.12）已结束或尚未开始</div>';
    }
  }

  updateProgress();

  var btnShowAll = document.getElementById("btnShowAll");
  if(btnShowAll) btnShowAll.addEventListener("click", function(){ showAllDays = true; rebuildAll(); });
  var btnFocus = document.getElementById("btnFocusMode");
  if(btnFocus) btnFocus.addEventListener("click", function(){ showAllDays = false; rebuildAll(); });
}

// ===== PROGRESS =====
function updateProgress(){
  var taskTotal = 0, taskDone = 0;
  var sectionDone = PREPLAN_COMPLETED_SECTIONS;
  var completedDays = 0;
  planData.forEach(function(day, di){
    var st = state[di];
    day.min.forEach(function(_, ti){ taskTotal++; if(st.minTasks[ti]) taskDone++; });
    day.extra.forEach(function(_, ti){ taskTotal++; if(st.extraTasks[ti]) taskDone++; });
    var minDone = day.min.length === 0 || st.minTasks.every(function(t){ return t; });
    if(minDone) sectionDone += DAY_SECTION_CREDITS[di] || 0;
    var extraDone = day.extra.length === 0 || st.extraTasks.every(function(t){ return t; });
    if(minDone && extraDone && (day.isRest || st.checkedIn)) completedDays++;
  });
  var pct = Math.round(sectionDone / TOTAL_COMM_SECTIONS * 100);
  document.getElementById("overallPct").textContent = pct + "%";
  document.getElementById("overallBar").style.width = pct + "%";
  var checkedInCount = state.filter(function(s, i){ return !planData[i].isRest && s.checkedIn; }).length;
  var totalStudyDays = planData.filter(function(d){ return !d.isRest; }).length;
  document.getElementById("progressDetail").innerHTML = '<span>全书小节 ' + sectionDone + '/' + TOTAL_COMM_SECTIONS + '</span><span>当前任务 ' + taskDone + '/' + taskTotal + '</span><span>计划天数 ' + completedDays + '/' + planData.length + '</span><span>打卡 ' + checkedInCount + '/' + totalStudyDays + '</span>';
}

// ===== EVENT DELEGATION =====
container.addEventListener("change", function(e){
  if(e.target.tagName !== "INPUT") return;
  var match = e.target.id.match(/^(min|extra)_(\d+)_(\d+)$/);
  if(!match) return;
  var type = match[1], di = parseInt(match[2]), ti = parseInt(match[3]);
  if(type === "min") state[di].minTasks[ti] = e.target.checked;
  else state[di].extraTasks[ti] = e.target.checked;
  saveLocalState();
  updateProgress();
});

container.addEventListener("click", function(e){
  var btn = e.target.closest("button");
  if(!btn) return;
  var di = parseInt(btn.dataset.day);
  var action = btn.dataset.action;
  if(action === "checkin"){
    state[di].checkedIn = !state[di].checkedIn;
    saveLocalState();
    saveLocalOpen();
    rebuildAll();
  } else if(action === "reset"){
    state[di] = { minTasks: planData[di].min.map(function(){ return false; }), extraTasks: planData[di].extra.map(function(){ return false; }), checkedIn: false };
    saveLocalState();
    saveLocalOpen();
    rebuildAll();
  }
});

// ===== EXPORT/IMPORT =====
function exportData(){
  var json = JSON.stringify(state, null, 2);
  navigator.clipboard.writeText(json).then(function(){
    var el = document.getElementById("copiedHint");
    el.style.display = "inline";
    setTimeout(function(){ el.style.display = "none"; }, 2000);
  }).catch(function(){
    // Fallback: show in a textarea for manual copy
    prompt("请手动复制以下内容，发送到另一台设备：", json);
  });
}

function importData(){
  var txt = prompt("请粘贴之前导出的数据：");
  if(!txt) return;
  try {
    var imported = JSON.parse(txt);
    if(imported.length !== planData.length){
      alert("数据格式不匹配（期望 " + planData.length + " 天，收到 " + imported.length + " 天）");
      return;
    }
    state = imported;
    saveLocalState();
    rebuildAll();
    alert("数据已导入！");
  } catch(e){
    alert("导入失败：数据格式不正确");
  }
}

window.exportData = exportData;
window.importData = importData;

// ===== INIT =====
function init(){
  var local = loadLocalState();
  if(local){ state = local; }
  else { state = defaultState(); }

  renderCalendars();
  rebuildAll();
}

init();

})();
</script>
